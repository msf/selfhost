global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'vmagent'
    static_configs:
      - targets: ['vmagent:8429']
  - job_name: 'victoriametrics'
    static_configs:
      - targets: ['victoriametrics:8428']
  - job_name: 'caddy'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics
